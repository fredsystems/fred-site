name: Deploy

on:
  # Build and deploy the image on pushes to main branch
  workflow_dispatch:
    inputs:
      reason:
        required: true
        description: "Reason for running this workflow"
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  workflow-dispatch:
    name: Triggered via Workflow Dispatch?
    # only run this step if workflow dispatch triggered
    # log the reason the workflow dispatch was triggered
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.reason != ''
    runs-on: ubuntu-24.04
    steps:
      - name: Log dispatch reason
        env:
          INPUTS_REASON: ${{ github.event.inputs.reason }}
          INPUTS_USE_TEST_IMAGE: ${{ github.event.inputs.use_test_image }}
          INPUTS_BUILD_LATEST_AS_TEST: ${{ github.event.inputs.build_latest_as_test }}
        run: |
          echo "Workflow dispatch reason: $INPUTS_REASON"
          echo "Use test image: $INPUTS_USE_TEST_IMAGE"
          echo "Build latest as test: $INPUTS_BUILD_LATEST_AS_TEST"

  deploy:
    name: Deploy
    uses: sdr-enthusiasts/common-github-workflows/.github/workflows/sdre.yml@main
    permissions:
      id-token: "write"
      contents: "read"
      attestations: "write"
      packages: "write"
    with:
      push_enabled: true
      push_destinations: ghcr.io
      ghcr_repo_owner: ${{ github.repository_owner }}
      ghcr_repo: ${{ github.repository }}
      build_latest: true
      build_baseimage_test: false
      platform_linux_arm32v7_enabled: false
      platform_linux_arm64v8_enabled: false
      build_baseimage_url: :base/:base-test-pr
    secrets:
      ghcr_token: ${{ secrets.GITHUB_TOKEN }}

  set-public:
    name: Set container image visibility to public
    needs: deploy
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
        run: |
          owner_type=$(gh api "/users/${OWNER}" --jq '.type')
          if [[ "${owner_type}" == "Organization" ]]; then
            endpoint="/orgs/${OWNER}/packages/container/${PACKAGE_NAME}"
          else
            endpoint="/user/packages/container/${PACKAGE_NAME}"
          fi
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${endpoint}" \
            -f visibility=public
